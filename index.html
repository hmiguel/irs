<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulador IRS · Portugal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <style>
    :root {
      --primary:    #e85d04;
      --primary-lt: #2a1200;
      --primary-md: #6b2900;
      --cyan:       #38bdf8;
      --green:      #34d399;
      --green-lt:   rgba(52,211,153,.12);
      --red:        #f87171;
      --red-lt:     rgba(248,113,113,.12);
      --amber:      #fbbf24;
      --amber-lt:   rgba(251,191,36,.12);
      --surface:    #1c1a18;
      --surface-2:  #252220;
      --bg:         #111009;
      --border:     rgba(255,255,255,0.12);
      --text:       #f0ece6;
      --muted:      #a09890;
      --radius:     0px;
      --shadow:     3px 3px 0 rgba(232,93,4,.3);
      --mono:       'JetBrains Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Screen-reader only ─────────────────────── */
    .sr-only {
      position: absolute; width: 1px; height: 1px;
      padding: 0; margin: -1px; overflow: hidden;
      clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }

    /* ── Focus indicators ───────────────────────── */
    :focus-visible {
      outline: 3px solid var(--primary);
      outline-offset: 2px;
    }
    :focus:not(:focus-visible) { outline: none; }

    /* ── Reduced motion ─────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
      }
    }

    body {
      font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
      scrollbar-color: var(--border) transparent;
    }

    /* ── Page shell ──────────────────────────────── */
    .page {
      max-width: 1040px;
      margin: 0 auto;
      padding: 0 1.25rem 3rem;
    }

    /* ── Year pill bar ──────────────────────────── */
    .year-bar {
      padding: 1.75rem 0 0;
    }
    .year-bar-inline {
      display: flex;
      align-items: center;
      gap: .75rem;
    }
    .year-bar-label {
      font-size: .68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .09em;
      color: var(--muted);
      flex-shrink: 0;
    }
    .year-bar-track {
      flex: 1;
      min-width: 0;
    }
    .delta-context {
      font-size: .68rem;
      font-weight: 600;
      color: var(--muted);
      margin-left: .5rem;
      opacity: .7;
    }
    @media (max-width: 480px) {
      .year-bar-track .slider-ticks span:nth-child(2n+2):not(:last-child) {
        visibility: hidden;
      }
    }

    /* ── Page heading ───────────────────────────── */
    .heading {
      display: flex;
      align-items: center;
      gap: .75rem;
      padding: 1.25rem 0 1.25rem;
    }
    .heading h1 {
      font-size: 1.7rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -.5px;
    }

    /* ── Main two-column grid ────────────────────── */
    .main-grid {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 1.25rem;
      align-items: start;
    }
    @media (max-width: 720px) {
      .main-grid { grid-template-columns: 1fr; }
    }

    /* ── Card base ──────────────────────────────── */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 2px solid var(--border);
      position: relative;
    }
    .card-header {
      padding: 1rem 1.25rem .75rem;
      border-bottom: 2px solid var(--border);
    }
    .card-label {
      font-size: .68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .09em;
      color: var(--muted);
    }
    .card-body { padding: 1.25rem; }
    .card-body-sm { padding: 1rem 1.25rem; }

    /* ── Income slider card ─────────────────────── */
    .slider-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .slider-big-val {
      font-size: 1.3rem;
      font-weight: 700;
      font-family: var(--mono);
      color: var(--primary);
      font-variant-numeric: tabular-nums;
    }
    .slider-wrap {
      position: relative;
      padding-top: 1.5rem;
      margin-top: .5rem;
    }
    .slider-bubble {
      position: absolute;
      top: 0;
      transform: translateX(-50%);
      background: var(--primary);
      color: #fff;
      font-size: .65rem;
      font-weight: 700;
      font-family: var(--mono);
      padding: .15rem .45rem;
      border-radius: 0;
      white-space: nowrap;
      pointer-events: none;
    }
    .slider-bubble::after {
      content: '';
      position: absolute;
      bottom: -4px; left: 50%;
      transform: translateX(-50%);
      border: 4px solid transparent;
      border-top-color: var(--primary);
      border-bottom: none;
    }
    input[type="range"].rng {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 6px;
      background: transparent; outline: none;
      cursor: pointer; display: block;
    }
    input[type="range"].rng::-webkit-slider-runnable-track {
      height: 4px; border-radius: 0;
      background: linear-gradient(to right,
        var(--primary) 0%, var(--primary) var(--pct, 35%),
        var(--border) var(--pct, 35%), var(--border) 100%);
    }
    input[type="range"].rng::-moz-range-track {
      height: 4px; border-radius: 0; background: var(--border);
    }
    input[type="range"].rng::-moz-range-progress {
      height: 4px; border-radius: 0; background: var(--primary);
    }
    input[type="range"].rng::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 18px; height: 18px; border-radius: 0;
      background: var(--primary); border: 2px solid var(--bg);
      box-shadow: none;
      margin-top: -7px; cursor: grab;
    }
    input[type="range"].rng::-webkit-slider-thumb:active { cursor: grabbing; }
    input[type="range"].rng::-moz-range-thumb {
      width: 18px; height: 18px; border-radius: 0;
      background: var(--primary); border: 2px solid var(--bg);
      box-shadow: none; cursor: grab;
    }
    .slider-ticks {
      display: flex; justify-content: space-between;
      margin-top: .5rem;
    }
    .slider-ticks span { font-size: .65rem; color: var(--muted); }

    /* ── Input fields ───────────────────────────── */
    .field { margin-bottom: .75rem; }
    .field:last-child { margin-bottom: 0; }
    .field label {
      display: block; font-size: .7rem; font-weight: 700;
      color: var(--muted); margin-bottom: .3rem;
      text-transform: uppercase; letter-spacing: .06em;
    }
    .field input, .field select {
      width: 100%; padding: .6rem .85rem;
      border: 2px solid var(--border); border-radius: 0;
      font-size: .9rem; color: var(--text);
      background: var(--bg); outline: none;
      transition: border-color .1s;
      font-family: inherit;
    }
    .field select option { background: #1c1a18; color: var(--text); }
    .field input:focus, .field select:focus {
      border-color: var(--primary);
    }
    .field input::placeholder { color: var(--muted); opacity: .5; }
    .year-badge {
      width: 100%; padding: .6rem .85rem;
      border: 2px solid var(--primary); border-radius: 0;
      font-size: .9rem; font-weight: 700; font-family: var(--mono);
      color: var(--primary);
      background: transparent; text-align: center;
    }
    .field-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: .6rem;
    }
    .optional-label {
      font-size: .62rem; color: var(--muted);
      text-align: right; margin-top: .2rem; opacity: .7;
    }

    /* ── Results panel ──────────────────────────── */
    .results-empty {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 3.5rem 1.5rem;
      color: var(--muted); font-size: .9rem;
      text-align: center; gap: .75rem;
    }
    .results-empty svg { opacity: .2; color: var(--primary); }

    /* Hero net number */
    .hero {
      padding: 2rem 1.5rem 1.75rem;
      background: var(--primary);
      color: #fff;
      position: relative;
      border-bottom: 2px solid var(--border);
    }
    .hero-label {
      font-size: .65rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .12em;
      color: rgba(255,255,255,.85); margin-bottom: .4rem;
    }
    .hero-amount {
      font-size: 2.8rem; font-weight: 700;
      font-family: var(--mono);
      letter-spacing: -.5px; font-variant-numeric: tabular-nums;
      line-height: 1.1;
      display: flex; align-items: baseline; gap: .5rem; flex-wrap: wrap;
    }
    .hero-sub {
      font-size: .75rem; color: rgba(255,255,255,.8); margin-top: .5rem;
      font-family: var(--mono);
    }

    /* Stat chips row */
    .stat-chips {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 0; background: var(--border);
      border-bottom: 2px solid var(--border);
    }
    .stat-chip {
      padding: .85rem 1rem;
      background: var(--surface);
      border-top: 3px solid transparent;
      border-right: 2px solid var(--border);
    }
    .stat-chip:last-child { border-right: none; }
    .stat-chip-label {
      font-size: .6rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .09em;
      color: var(--muted); margin-bottom: .25rem;
    }
    .stat-chip-val {
      font-size: .95rem; font-weight: 700;
      font-family: var(--mono);
      font-variant-numeric: tabular-nums;
    }
    .stat-chip-pct {
      font-size: .65rem; color: var(--muted);
      margin-top: .1rem; font-weight: 500;
      font-family: var(--mono);
    }
    .chip-ss  { border-top-color: var(--amber); }
    .chip-tax { border-top-color: var(--red); }
    .chip-net { border-top-color: var(--green); }
    .chip-ss   .stat-chip-val { color: var(--amber); }
    .chip-tax  .stat-chip-val { color: var(--red); }
    .chip-net  .stat-chip-val { color: var(--green); }

    /* Breakdown bar */
    .breakdown-section { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); }
    .breakdown-bar {
      height: 8px; border-radius: 0;
      overflow: hidden; display: flex;
      background: var(--border);
    }
    .breakdown-seg {
      height: 100%;
      transition: width .35s ease;
    }
    .seg-ss  { background: var(--amber); }
    .seg-tax { background: var(--red); }
    .seg-net { background: var(--green); }
    .breakdown-legend {
      display: flex; gap: 1rem; margin-top: .55rem;
    }
    .legend-item {
      display: flex; align-items: center; gap: .35rem;
      font-size: .65rem; color: var(--muted); font-weight: 500;
    }
    .legend-dot {
      width: 8px; height: 8px; border-radius: 0; flex-shrink: 0;
    }

    /* Detail rows */
    .detail-section { padding: .5rem 1.5rem 1rem; }
    .detail-row {
      display: flex; justify-content: space-between;
      align-items: baseline;
      padding: .5rem 0;
      border-bottom: 1px solid var(--border);
      font-size: .85rem;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-row .lbl { color: var(--muted); font-weight: 500; }
    .detail-row .val {
      font-weight: 600; font-family: var(--mono);
      font-variant-numeric: tabular-nums;
    }
    .detail-row.sub .lbl { padding-left: 1rem; font-size: .8rem; }
    .detail-row.sub .val { font-weight: 400; }
    .detail-row.strong .lbl { font-weight: 700; color: var(--text); }
    .detail-row.strong .val { font-size: .95rem; font-weight: 700; }

    /* TET row */
    .tet-row {
      margin: 0 1.25rem .75rem;
      display: flex; justify-content: space-between; align-items: center;
      background: transparent;
      border: 2px solid var(--primary);
      border-radius: 0;
      padding: .75rem 1rem;
    }
    .tet-label { font-size: .7rem; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: .07em; }
    .tet-val-wrap { display: flex; align-items: baseline; gap: .4rem; }
    .tet-val   { font-size: 1.2rem; font-weight: 700; font-family: var(--mono); color: var(--primary); }

    /* Assessed row */
    .assessed-row {
      margin: 0 1.25rem 1.25rem;
      border-radius: 0;
      padding: .85rem 1rem;
      display: flex; justify-content: space-between; align-items: center;
    }
    .assessed-row.payment { background: transparent; border: 2px solid var(--red); }
    .assessed-row.refund  { background: transparent; border: 2px solid var(--green); }
    .assessed-label { font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; }
    .assessed-val   { font-size: 1.15rem; font-weight: 700; font-family: var(--mono); }
    .assessed-row.payment .assessed-label,
    .assessed-row.payment .assessed-val { color: var(--red); }
    .assessed-row.refund  .assessed-label,
    .assessed-row.refund  .assessed-val { color: var(--green); }

    .badge {
      display: inline-block;
      background: transparent; color: var(--primary);
      font-size: .6rem; font-weight: 700;
      padding: .05rem .35rem;
      border: 1px solid var(--primary);
      border-radius: 0;
      margin-left: .3rem; vertical-align: middle;
      font-family: var(--mono);
    }
    .badge-auto { color: var(--green); border-color: var(--green); }

    /* Delta badges */
    .delta {
      font-size: .62rem; font-weight: 700;
      font-family: var(--mono);
      padding: .08rem .35rem;
      border-radius: 0; border: 1px solid currentColor;
      vertical-align: middle; white-space: nowrap;
    }
    .delta-up      { color: var(--green); }
    .delta-down    { color: var(--red); }
    .delta-tax-up  { color: var(--red); }
    .delta-tax-down{ color: var(--green); }
    .delta-neutral { color: var(--muted); }
    /* On the orange hero background, override to readable white */
    .hero .delta-up, .hero .delta-down,
    .hero .delta-tax-up, .hero .delta-tax-down,
    .hero .delta-neutral {
      color: #fff;
      border-color: rgba(255,255,255,.55);
    }

    /* Inflation row */
    .inflation-row {
      background: transparent;
      border: 1px solid var(--cyan);
      border-radius: 0;
      padding: .5rem .75rem;
      margin: .4rem 0 0;
    }
    .inflation-row .lbl { color: var(--cyan) !important; }
    .inflation-val { color: var(--cyan) !important; font-family: var(--mono); }

    /* ── Light mode — Bauhaus / Braun ────────────── */
    body.light {
      --primary:    #e85d04;
      --primary-lt: #fff3eb;
      --primary-md: #fed7aa;
      --cyan:       #0284c7;
      --green:      #16a34a;
      --green-lt:   rgba(22,163,74,.08);
      --red:        #dc2626;
      --red-lt:     rgba(220,38,38,.08);
      --amber:      #d97706;
      --amber-lt:   rgba(217,119,6,.08);
      --surface:    #ffffff;
      --surface-2:  #faf7f4;
      --bg:         #f5f0e8;
      --border:     #1a1a1a;
      --text:       #111111;
      --muted:      #555555;
      --shadow:     3px 3px 0 #111111;
      scrollbar-color: #ccc transparent;
    }
    body.light .field input, body.light .field select {
      background: #fff;
      border-color: #1a1a1a;
      color: #111;
    }
    body.light .field input:focus, body.light .field select:focus {
      border-color: var(--primary);
    }
    body.light .field select option { background: #fff; color: #111; }
    body.light .field input::placeholder { color: #aaa; opacity: 1; }
    body.light .year-badge {
      background: transparent;
      border-color: var(--primary);
      color: var(--primary);
    }
    body.light .hero {
      background: var(--primary);
      border-bottom-color: #1a1a1a;
    }
    body.light .chip-ss  { border-top-color: var(--amber); }
    body.light .chip-tax { border-top-color: var(--red); }
    body.light .chip-net { border-top-color: var(--green); }
    body.light .breakdown-bar { background: #ddd; }
    body.light .seg-ss  { background: var(--amber); }
    body.light .seg-tax { background: var(--red); }
    body.light .seg-net { background: var(--green); }
    body.light .inflation-row { border-color: var(--cyan); }
    body.light .inflation-row .lbl { color: var(--cyan) !important; }
    body.light .inflation-val { color: var(--cyan) !important; }

    /* ── Theme toggle button ─────────────────────── */
    .theme-toggle {
      margin-left: auto;
      background: transparent;
      border: 2px solid var(--border);
      border-radius: 0;
      padding: .38rem .5rem;
      cursor: pointer;
      color: var(--muted);
      display: flex; align-items: center; justify-content: center;
      transition: border-color .1s, color .1s;
      flex-shrink: 0;
    }
    .theme-toggle:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    /* ── Escalões (brackets) ────────────────────── */
    .brackets-toggle {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      padding: .7rem 1.25rem;
      cursor: pointer;
      border: none;
      border-top: 2px solid var(--border);
      border-radius: 0;
      background: transparent;
      font-family: inherit;
      font-size: .65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--muted);
      user-select: none;
      transition: color .1s;
    }
    .brackets-toggle:hover { color: var(--primary); }
    .brackets-toggle-icon {
      font-family: var(--mono);
      font-size: .9rem;
      line-height: 1;
    }
    .brackets-section {
      border-top: 2px solid var(--border);
      overflow-x: auto;
    }
    .brackets-section table {
      width: 100%;
      border-collapse: collapse;
    }
    .brackets-section thead tr {
      border-bottom: 2px solid var(--border);
    }
    .brackets-section th {
      padding: .45rem .75rem;
      text-align: left;
      font-size: .58rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--muted);
    }
    .brackets-section th:not(:first-child) { text-align: right; }
    .brackets-section td {
      padding: .45rem .75rem;
      border-bottom: 1px solid var(--border);
      font-family: var(--mono);
      font-size: .75rem;
      color: var(--text);
    }
    .brackets-section td:not(:first-child) { text-align: right; }
    .brackets-section tbody tr:last-child td { border-bottom: none; }
    .brackets-section tbody tr.bracket-active td {
      color: var(--primary);
      font-weight: 700;
    }
    .brackets-section tbody tr.bracket-active td:first-child {
      border-left: 3px solid var(--primary);
      padding-left: calc(.75rem - 3px);
    }

    /* ── Footer ──────────────────────────────────── */
    .footer {
      text-align: center; color: var(--muted);
      font-size: .72rem; padding: 1.75rem 0 .5rem;
      font-weight: 500;
    }
  </style>
</head>
<body x-data="irsCalc()" :class="darkMode ? '' : 'light'">
<div class="page">

  <!-- Year slider bar -->
  <nav class="year-bar" aria-label="Selecionar ano fiscal">
    <div class="year-bar-inline">
      <span class="year-bar-label" id="label-year-slider">Ano fiscal</span>
      <div class="year-bar-track">
        <div class="slider-wrap" style="margin-top:0;">
          <div class="slider-bubble" aria-hidden="true"
               :style="'left:clamp(16px,' + yearSliderPercent + '%,calc(100% - 16px))'"
               x-text="year">
          </div>
          <input type="range" id="input-year-slider" class="rng"
                 min="0" max="18" step="1"
                 aria-labelledby="label-year-slider"
                 :aria-valuetext="year + ' — Ano fiscal'"
                 x-model.number="yearIdx"
                 :style="'--pct:' + yearSliderPercent + '%'">
        </div>
        <div class="slider-ticks">
          <span>2008</span><span>2010</span><span>2012</span><span>2014</span>
          <span>2016</span><span>2018</span><span>2020</span><span>2022</span>
          <span>2024</span><span>2026</span>
        </div>
      </div>
    </div>
    <template x-if="prevYear">
      <span class="delta-context" x-text="'Δ vs ' + prevYear"></span>
    </template>
  </nav>

  <!-- Heading -->
  <div class="heading">
    <h1>Simulador IRS</h1>
    <button class="theme-toggle" @click="toggleTheme()"
            :aria-label="darkMode ? 'Mudar para modo claro' : 'Mudar para modo escuro'">
      <template x-if="darkMode">
        <svg aria-hidden="true" focusable="false" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/>
          <path stroke-linecap="round" d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
      </template>
      <template x-if="!darkMode">
        <svg aria-hidden="true" focusable="false" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
        </svg>
      </template>
    </button>
  </div>

  <!-- Two-column grid -->
  <div class="main-grid">

    <!-- ── LEFT: Inputs ── -->
    <div style="display:flex; flex-direction:column; gap:1.25rem;">

      <!-- Income slider -->
      <div class="card">
        <div class="card-body-sm">
          <div class="slider-header">
            <label class="card-label" for="input-gross-slider">Rendimento Bruto</label>
            <span class="slider-big-val" aria-hidden="true" x-text="'€ ' + fmt(gross)"></span>
          </div>
          <div class="slider-wrap">
            <div class="slider-bubble" aria-hidden="true"
                 :style="'left:clamp(16px,' + sliderPercent + '%,calc(100% - 16px))'"
                 x-text="'€ ' + fmt(gross)">
            </div>
            <input type="range" id="input-gross-slider" class="rng"
                   min="0" max="100000" step="500"
                   :aria-valuetext="'€ ' + fmt(gross)"
                   x-model="grossInput"
                   :style="'--pct:' + sliderPercent + '%'">
          </div>
          <div class="slider-ticks">
            <span>0</span><span>25k</span><span>50k</span><span>75k</span><span>100k</span>
          </div>
        </div>
      </div>

      <!-- Fields -->
      <div class="card">
        <div class="card-header"><div class="card-label">Dados</div></div>
        <div class="card-body">

          <div class="field">
            <label for="input-gross">Rendimento Bruto Anual (€)</label>
            <input id="input-gross" type="number" min="0" step="100" placeholder="Ex: 35 000"
                   x-model="grossInput">
          </div>

          <div class="field-row">
            <div class="field" style="margin-bottom:0;">
              <label for="input-municipality">Município</label>
              <select id="input-municipality" x-model="municipality">
                <template x-for="m in sortedMunicipalities" :key="m">
                  <option :value="m" x-text="titleCase(m)"></option>
                </template>
              </select>
            </div>
            <div class="field" style="margin-bottom:0;">
              <label for="input-year" id="label-year">Ano fiscal</label>
              <div id="input-year" class="year-badge" role="status" aria-live="polite" x-text="year"></div>
            </div>
          </div>

          <div style="height:.75rem;"></div>

          <div class="field">
            <label for="input-specific-deduction">Dedução específica (€)
              <span class="badge badge-auto" x-show="!specificDeductionInput">calc</span>
            </label>
            <input id="input-specific-deduction" type="number" min="0" step="0.01"
                   :placeholder="gross > 0 ? fmt(specificDeductionAuto) : 'Ex: 4 350,24'"
                   x-model="specificDeductionInput">
          </div>

          <div class="field-row">
            <div class="field" style="margin-bottom:0;">
              <label for="input-deductions">Deduções à coleta</label>
              <input id="input-deductions" type="number" min="0" step="10" placeholder="Ex: 892"
                     aria-describedby="hint-deductions"
                     x-model="deductionsInput">
              <div id="hint-deductions" class="optional-label">opcional</div>
            </div>
            <div class="field" style="margin-bottom:0;">
              <label for="input-withheld">Retenção na fonte</label>
              <input id="input-withheld" type="number" min="0" step="10" placeholder="Ex: 5 200"
                     aria-describedby="hint-withheld"
                     x-model="withheldInput">
              <div id="hint-withheld" class="optional-label">opcional</div>
            </div>
          </div>

        </div>
      </div>

    </div><!-- /LEFT -->

    <!-- ── RIGHT: Results ── -->
    <div class="card">

      <!-- Empty state -->
      <template x-if="gross === 0">
        <div class="results-empty">
          <svg aria-hidden="true" focusable="false" width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
          </svg>
          <span>Introduza o rendimento bruto para ver a simulação</span>
        </div>
      </template>

      <!-- Results -->
      <template x-if="gross > 0">
        <div aria-live="polite" aria-atomic="true" aria-label="Resultados da simulação">

          <!-- Hero -->
          <div class="hero">
            <div class="hero-label">Rendimento Líquido estimado</div>
            <div class="hero-amount">
              <span x-text="'€ ' + fmt(takeHome)"></span>
              <template x-if="deltaTakeHome !== null">
                <span :class="deltaClass(deltaTakeHome, false)">
                  <span class="sr-only" x-text="deltaTakeHome > 0 ? 'subiu' : 'desceu'"></span>
                  <span aria-hidden="true" x-text="(deltaTakeHome > 0 ? '+' : '−') + ' € ' + fmt(Math.abs(deltaTakeHome))"></span>
                </span>
              </template>
            </div>
            <div class="hero-sub" x-text="'de € ' + fmt(gross) + ' brutos · ' + year"></div>
          </div>

          <!-- Stat chips -->
          <div class="stat-chips">
            <div class="stat-chip chip-ss">
              <div class="stat-chip-label">Seg. Social</div>
              <div class="stat-chip-val" x-text="'€ ' + fmt(specificDeduction)"></div>
              <div class="stat-chip-pct" x-text="fmtPct(specificDeduction/gross*100)"></div>
            </div>
            <div class="stat-chip chip-tax">
              <div class="stat-chip-label">IRS Líquido</div>
              <div class="stat-chip-val" x-text="'€ ' + fmt(netTax)"></div>
              <div class="stat-chip-pct" x-text="fmtPct(netTax/gross*100)"></div>
            </div>
            <div class="stat-chip chip-net">
              <div class="stat-chip-label">Líquido</div>
              <div class="stat-chip-val" x-text="'€ ' + fmt(takeHome)"></div>
              <div class="stat-chip-pct" x-text="fmtPct(takeHome/gross*100)"></div>
            </div>
          </div>

          <!-- Breakdown bar -->
          <div class="breakdown-section">
            <div class="breakdown-bar">
              <div class="breakdown-seg seg-ss"  :style="'width:' + Math.max(1, specificDeduction/gross*100) + '%'"></div>
              <div class="breakdown-seg seg-tax" :style="'width:' + Math.max(0, netTax/gross*100) + '%'"></div>
              <div class="breakdown-seg seg-net" :style="'width:' + Math.max(0, takeHome/gross*100) + '%'"></div>
            </div>
            <div class="breakdown-legend">
              <div class="legend-item">
                <div class="legend-dot" style="background:var(--amber)"></div>
                <span>Seg. Social + Ded. Específica</span>
              </div>
              <div class="legend-item">
                <div class="legend-dot" style="background:var(--red)"></div>
                <span>IRS</span>
              </div>
              <div class="legend-item">
                <div class="legend-dot" style="background:var(--green)"></div>
                <span>Líquido</span>
              </div>
            </div>
          </div>

          <!-- Detail breakdown -->
          <div class="detail-section">

            <div class="detail-row sub">
              <span class="lbl">
                Dedução específica
                <span class="badge badge-auto" x-show="!specificDeductionInput">calc</span>
              </span>
              <span class="val" x-text="'− € ' + fmt(specificDeduction)"></span>
            </div>

            <div class="detail-row strong">
              <span class="lbl">Rendimento Coletável</span>
              <span class="val" x-text="'€ ' + fmt(collectableIncome)"></span>
            </div>

            <div class="detail-row sub">
              <span class="lbl">
                Escalão
                <span class="badge" x-text="fmtPct(bracket.tax * 100)"></span>
              </span>
              <span class="val" x-text="'€ ' + fmt(amountCalculated)"></span>
            </div>

            <div class="detail-row sub">
              <span class="lbl">Parcela a abater</span>
              <span class="val" x-text="'− € ' + fmt(bracket.parcel)"></span>
            </div>

            <div class="detail-row">
              <span class="lbl">Coleta (base)</span>
              <span class="val" x-text="'€ ' + fmt(baseTax)"></span>
            </div>

            <template x-if="deductions > 0">
              <div class="detail-row sub">
                <span class="lbl">Deduções à coleta</span>
                <span class="val" x-text="'− € ' + fmt(deductions)"></span>
              </div>
            </template>

            <div class="detail-row sub">
              <span class="lbl">
                Benefício municipal
                <span class="badge" x-text="titleCase(municipality) + ' ' + fmtPct(countyRate*100)"></span>
              </span>
              <span class="val"
                    x-text="countyBenefit > 0 ? '− € ' + fmt(countyBenefit) : '€ ' + fmt(0)">
              </span>
            </div>

            <div class="detail-row strong">
              <span class="lbl">Coleta Líquida</span>
              <span class="val" style="display:flex;align-items:baseline;gap:.35rem;">
                <span x-text="'€ ' + fmt(netTax)"></span>
                <template x-if="deltaNetTax !== null">
                  <span :class="deltaClass(deltaNetTax, true)">
                    <span class="sr-only" x-text="deltaNetTax > 0 ? 'subiu' : 'desceu'"></span>
                    <span aria-hidden="true" x-text="(deltaNetTax > 0 ? '+' : '−') + ' € ' + fmt(Math.abs(deltaNetTax))"></span>
                  </span>
                </template>
              </span>
            </div>

            <template x-if="inflationAdjustedTakeHome !== null">
              <div class="detail-row inflation-row">
                <span class="lbl">
                  Poder de compra em <span x-text="availableYears[availableYears.length-1]"></span>€
                  <span class="badge" style="background:rgba(56,189,248,.15);color:var(--cyan);">inflação acum.</span>
                </span>
                <span class="val inflation-val" x-text="'≈ € ' + fmt(inflationAdjustedTakeHome)"></span>
              </div>
            </template>

          </div>

          <!-- TET -->
          <div class="tet-row">
            <span class="tet-label">Taxa Efetiva de Tributação</span>
            <div class="tet-val-wrap">
              <span class="tet-val" x-text="fmtPct(effectiveRate)"></span>
              <template x-if="deltaEffectiveRate !== null">
                <span :class="deltaClass(deltaEffectiveRate, true)">
                  <span class="sr-only" x-text="deltaEffectiveRate > 0 ? 'subiu' : 'desceu'"></span>
                  <span aria-hidden="true" x-text="(deltaEffectiveRate > 0 ? '+' : '') + deltaEffectiveRate.toFixed(2) + ' pp'"></span>
                </span>
              </template>
            </div>
          </div>

          <!-- A pagar / A receber -->
          <template x-if="withheld > 0">
            <div class="assessed-row" :class="assessedTax >= 0 ? 'payment' : 'refund'">
              <span class="assessed-label"
                    x-text="assessedTax >= 0 ? 'A pagar ao estado' : 'Reembolso estimado'">
              </span>
              <span class="assessed-val"
                    x-text="(assessedTax >= 0 ? '€ ' : '+ € ') + fmt(Math.abs(assessedTax))">
              </span>
            </div>
          </template>

        </div>
      </template>

      <!-- Escalões -->
      <button class="brackets-toggle" @click="showBrackets = !showBrackets"
              :aria-expanded="showBrackets"
              :aria-label="'Escalões de IRS ' + year + (showBrackets ? ' — fechar' : ' — abrir')">
        <span aria-hidden="true">Escalões <span x-text="year"></span></span>
        <span class="brackets-toggle-icon" aria-hidden="true" x-text="showBrackets ? '−' : '+'"></span>
      </button>

      <template x-if="showBrackets">
        <div class="brackets-section">
          <table>
            <caption class="sr-only" x-text="'Escalões de IRS ' + year"></caption>
            <thead>
              <tr>
                <th scope="col">Rendimento coletável</th>
                <th scope="col">Taxa</th>
                <th scope="col">Parcela a abater</th>
              </tr>
            </thead>
            <tbody>
              <template x-for="(row, idx) in bracketRows" :key="idx">
                <tr :class="row.active ? 'bracket-active' : ''">
                  <td>
                    <template x-if="row.to === null">
                      <span x-text="'Acima de € ' + fmtInt(row.from)"></span>
                    </template>
                    <template x-if="row.to !== null && row.from === 0">
                      <span x-text="'Até € ' + fmtInt(row.to)"></span>
                    </template>
                    <template x-if="row.to !== null && row.from > 0">
                      <span x-text="'€ ' + fmtInt(row.from) + ' – ' + fmtInt(row.to)"></span>
                    </template>
                  </td>
                  <td x-text="fmtPct(row.tax * 100)"></td>
                  <td x-text="row.parcel > 0 ? '€ ' + fmt(row.parcel) : '—'"></td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
      </template>

    </div><!-- /RIGHT -->

  </div><!-- /main-grid -->

  <footer class="footer">
    Cálculo aproximado. Não substitui declaração oficial AT.
    Dados de 2008–2023 são aproximados.
  </footer>

</div><!-- /page -->

    function r2(n) { return Math.round(n * 100) / 100; }

    const INFLATION = {
      2008:2.59,2009:-0.83,2010:1.40,2011:3.65,2012:2.77,2013:0.30,
      2014:-0.36,2015:0.50,2016:0.60,2017:1.40,2018:1.50,2019:0.30,
      2020:-0.01,2021:1.27,2022:7.80,2023:3.80,2024:2.40,2025:2.30
    };

    document.addEventListener('alpine:init', () => {
      Alpine.data('irsCalc', () => ({
        darkMode: localStorage.getItem('irs-theme') !== 'light',
        showBrackets: false,
        grossInput: '35000',
        municipality: 'porto',
        yearIdx: Math.min(Math.max(new Date().getFullYear() - 1, 2008), 2026) - 2008,
        specificDeductionInput: '',
        deductionsInput: '650',
        withheldInput: '5200',

        init() {
          this.$nextTick(() => {
            const m = this.municipality;
            this.municipality = '';
            this.$nextTick(() => { this.municipality = m; });
          });
        },

        get year()             { return this.availableYears[this.yearIdx]; },
        get yearSliderPercent(){ return (this.yearIdx / (this.availableYears.length - 1)) * 100; },
        get gross()      { return parseFloat(this.grossInput) || 0; },
        get deductions() { return parseFloat(this.deductionsInput) || 0; },
        get withheld()   { return parseFloat(this.withheldInput) || 0; },
        get yearData()   { return TAX_DATA[this.year]; },
        get countyRate() { return this.yearData.county_tax[this.municipality] ?? 0; },
        get brackets()   { return Object.values(this.yearData.table); },

        get availableYears() {
          return ['2008','2009','2010','2011','2012','2013','2014','2015',
                  '2016','2017','2018','2019','2020','2021','2022','2023','2024','2025','2026'];
        },
        get sliderPercent() { return Math.min(100, Math.max(0, this.gross / 1000)); },

        get sortedMunicipalities() {
          return Object.keys(this.yearData.county_tax).sort((a, b) => a.localeCompare(b, 'pt'));
        },
        get specificDeductionAuto() {
          return r2(Math.max(this.yearData.specific_deduction,
                             this.gross * this.yearData.social_security_tax));
        },
        get specificDeduction() {
          const m = parseFloat(this.specificDeductionInput);
          return isNaN(m) ? this.specificDeductionAuto : r2(m);
        },
        get collectableIncome() { return r2(Math.max(0, this.gross - this.specificDeduction)); },
        get bracket() {
          return this.brackets.find(b => this.collectableIncome < b.to)
              || this.brackets[this.brackets.length - 1];
        },
        get amountCalculated() { return r2(this.collectableIncome * this.bracket.tax); },
        get baseTax()          { return r2(this.amountCalculated - this.bracket.parcel); },
        get countyBenefit()    { return r2((this.baseTax - this.deductions) * (0.05 - this.countyRate)); },
        get netTax()           { return r2(this.baseTax - this.deductions - Math.max(0, this.countyBenefit)); },
        get takeHome()         { return r2(this.gross - this.specificDeduction - this.netTax); },
        get assessedTax()      { return r2(this.netTax - this.withheld); },
        get effectiveRate()    { return this.gross > 0 ? (this.netTax / this.gross * 100) : 0; },

        get prevYear() {
          const idx = this.availableYears.indexOf(this.year);
          return idx > 0 ? this.availableYears[idx - 1] : null;
        },
        get prevCalc() {
          if (!this.prevYear || this.gross === 0) return null;
          const yd = TAX_DATA[this.prevYear];
          const ss   = r2(Math.max(yd.specific_deduction, this.gross * yd.social_security_tax));
          const col  = r2(Math.max(0, this.gross - ss));
          const brks = Object.values(yd.table);
          const brk  = brks.find(b => col < b.to) || brks[brks.length - 1];
          const base = r2(col * brk.tax - brk.parcel);
          const cr   = yd.county_tax?.[this.municipality] ?? 0;
          const ben  = r2(base * (0.05 - cr));
          const net  = r2(base - Math.max(0, ben));
          return { netTax: net, takeHome: r2(this.gross - ss - net), tet: this.gross > 0 ? net / this.gross * 100 : 0 };
        },
        get bracketRows() {
          const brks = this.brackets;
          return brks.map((b, i) => {
            const from = i === 0 ? 0 : brks[i - 1].to;
            const to   = b.to >= 1e10 ? null : b.to;
            const active = this.gross > 0 &&
              this.collectableIncome > from &&
              (to === null || this.collectableIncome <= to);
            return { from, to, tax: b.tax, parcel: b.parcel, active };
          });
        },

        get deltaTakeHome()      { return this.prevCalc ? r2(this.takeHome      - this.prevCalc.takeHome) : null; },
        get deltaNetTax()        { return this.prevCalc ? r2(this.netTax        - this.prevCalc.netTax)   : null; },
        get deltaEffectiveRate() { return this.prevCalc ? r2(this.effectiveRate - this.prevCalc.tet)      : null; },

        get inflationAdjustedTakeHome() {
          if (this.gross === 0) return null;
          const latestYear = parseInt(this.availableYears[this.availableYears.length - 1]);
          const curYear = parseInt(this.year);
          if (curYear >= latestYear) return null;
          let factor = 1;
          for (let y = curYear + 1; y <= latestYear; y++) {
            factor *= (1 + (INFLATION[y] ?? 0) / 100);
          }
          return r2(this.takeHome * factor);
        },

        toggleTheme() {
          this.darkMode = !this.darkMode;
          localStorage.setItem('irs-theme', this.darkMode ? 'dark' : 'light');
        },

        deltaClass(n, inverse) {
          if (n === null || n === 0) return 'delta delta-neutral';
          if (inverse) return n > 0 ? 'delta delta-tax-up' : 'delta delta-tax-down';
          return n > 0 ? 'delta delta-up' : 'delta delta-down';
        },

        fmt(n) {
          return new Intl.NumberFormat('pt-PT', {minimumFractionDigits:2, maximumFractionDigits:2}).format(n);
        },
        fmtInt(n) {
          return new Intl.NumberFormat('pt-PT').format(Math.round(n));
        },
        fmtPct(n) {
          return new Intl.NumberFormat('pt-PT', {minimumFractionDigits:2, maximumFractionDigits:2}).format(n) + '%';
        },
        titleCase(s) {
          return s.replace(/(^|\s|\()(\S)/g, (_, sep, c) => sep + c.toUpperCase());
        },
      }));
    });
